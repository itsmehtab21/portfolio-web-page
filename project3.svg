<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 430">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#141B24"/>
      <stop offset="100%" stop-color="#05070A"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD000"/>
      <stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
  </defs>

  <circle cx="215" cy="215" r="215" fill="url(#bg)"/>

  <!-- circuit lines -->
  <g stroke="#1c2733" stroke-width="2" fill="none" opacity="0.9">
    <path d="M30 100 H140 V60"/>
    <path d="M400 120 H300 V180"/>
    <path d="M40 340 H150 V380"/>
    <path d="M390 320 H280 V370"/>
  </g>
  <g fill="#00F5FF" opacity="0.7">
    <circle cx="140" cy="60" r="4"/>
    <circle cx="300" cy="180" r="4"/>
    <circle cx="150" cy="380" r="4"/>
    <circle cx="280" cy="370" r="4"/>
  </g>

  <!-- silhouette -->
  <circle cx="215" cy="168" r="62" fill="#1a2530"/>
  <path d="M100 360c10-70 55-108 115-108s105 38 115 108Z" fill="#1a2530"/>

  <!-- visor accent -->
  <rect x="168" y="150" width="94" height="16" rx="8" fill="#FFD000" opacity="0.85"/>

  <circle cx="215" cy="215" r="212" fill="none" stroke="url(#ring)" stroke-width="4"/>
</svg>
